<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 210" width="160" height="210">
  <!-- Left post: full height -->
  <line x1="22"  y1="10"  x2="22"  y2="200" stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
  <!-- Right post: full height -->
  <line x1="138" y1="10"  x2="138" y2="200" stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
  <!-- Center post: crossbar to bottom only -->
  <line x1="80"  y1="82"  x2="80"  y2="200" stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
  <!-- Horizontal crossbar -->
  <line x1="22"  y1="82"  x2="138" y2="82"  stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
  <!-- Left diagonal: top-left post → crossbar/center junction -->
  <line x1="22"  y1="10"  x2="80"  y2="82"  stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
  <!-- Right diagonal: top-right post → crossbar/center junction -->
  <line x1="138" y1="10"  x2="80"  y2="82"  stroke="#1C1410" stroke-width="9" stroke-linecap="square"/>
</svg>
